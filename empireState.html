<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire State Building - 3D CSS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #scene {
            perspective: 2000px;
            perspective-origin: center center;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        #building-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-style: preserve-3d;
            transform: translate(-50%, -50%) rotateX(-20deg);
            transition: transform 0.1s ease-out;
        }

        /* Estilos para bloques del edificio */
        .building-block {
            position: relative;
            transform-style: preserve-3d;
            margin: 0 auto;
        }

        /* Cara de un cubo */
        .face {
            position: absolute;
            border: 1px solid rgba(0, 0, 0, 0.2);
            background: #8b9dc3;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.1);
        }

        /* Ventana individual */
        .window {
            background: #1a1a2e;
            border: 1px solid #0a0a1a;
            margin: 2px;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
        }

        .window.lit {
            background: #ffd700;
            box-shadow: 0 0 10px #ffd700, inset 0 0 10px rgba(255, 215, 0, 0.8);
            animation: flicker 3s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Base principal */
        #base {
            width: 300px;
            height: 400px;
            transform: translateY(0);
        }

        #base .face.front {
            width: 300px;
            height: 400px;
            transform: rotateY(0deg) translateZ(150px);
        }

        #base .face.back {
            width: 300px;
            height: 400px;
            transform: rotateY(180deg) translateZ(150px);
        }

        #base .face.left {
            width: 300px;
            height: 400px;
            transform: rotateY(-90deg) translateZ(150px);
        }

        #base .face.right {
            width: 300px;
            height: 400px;
            transform: rotateY(90deg) translateZ(150px);
        }

        #base .face.top {
            width: 300px;
            height: 300px;
            transform: rotateX(90deg) translateZ(200px);
            background: #6b7da3;
        }

        #base .face.bottom {
            width: 300px;
            height: 300px;
            transform: rotateX(-90deg) translateZ(200px);
            background: #6b7da3;
        }

        /* Segunda sección */
        #section2 {
            width: 240px;
            height: 500px;
            transform: translateY(-450px);
        }

        #section2 .face.front,
        #section2 .face.back {
            width: 240px;
            height: 500px;
        }

        #section2 .face.front {
            transform: rotateY(0deg) translateZ(120px);
        }

        #section2 .face.back {
            transform: rotateY(180deg) translateZ(120px);
        }

        #section2 .face.left,
        #section2 .face.right {
            width: 240px;
            height: 500px;
        }

        #section2 .face.left {
            transform: rotateY(-90deg) translateZ(120px);
        }

        #section2 .face.right {
            transform: rotateY(90deg) translateZ(120px);
        }

        #section2 .face.top {
            width: 240px;
            height: 240px;
            transform: rotateX(90deg) translateZ(250px);
            background: #6b7da3;
        }

        #section2 .face.bottom {
            width: 240px;
            height: 240px;
            transform: rotateX(-90deg) translateZ(250px);
            background: #6b7da3;
        }

        /* Tercera sección */
        #section3 {
            width: 180px;
            height: 400px;
            transform: translateY(-950px);
        }

        #section3 .face.front,
        #section3 .face.back {
            width: 180px;
            height: 400px;
        }

        #section3 .face.front {
            transform: rotateY(0deg) translateZ(90px);
        }

        #section3 .face.back {
            transform: rotateY(180deg) translateZ(90px);
        }

        #section3 .face.left,
        #section3 .face.right {
            width: 180px;
            height: 400px;
        }

        #section3 .face.left {
            transform: rotateY(-90deg) translateZ(90px);
        }

        #section3 .face.right {
            transform: rotateY(90deg) translateZ(90px);
        }

        #section3 .face.top {
            width: 180px;
            height: 180px;
            transform: rotateX(90deg) translateZ(200px);
            background: #6b7da3;
        }

        #section3 .face.bottom {
            width: 180px;
            height: 180px;
            transform: rotateX(-90deg) translateZ(200px);
            background: #6b7da3;
        }

        /* Cuarta sección */
        #section4 {
            width: 120px;
            height: 350px;
            transform: translateY(-1350px);
        }

        #section4 .face.front,
        #section4 .face.back {
            width: 120px;
            height: 350px;
        }

        #section4 .face.front {
            transform: rotateY(0deg) translateZ(60px);
        }

        #section4 .face.back {
            transform: rotateY(180deg) translateZ(60px);
        }

        #section4 .face.left,
        #section4 .face.right {
            width: 120px;
            height: 350px;
        }

        #section4 .face.left {
            transform: rotateY(-90deg) translateZ(60px);
        }

        #section4 .face.right {
            transform: rotateY(90deg) translateZ(60px);
        }

        #section4 .face.top {
            width: 120px;
            height: 120px;
            transform: rotateX(90deg) translateZ(175px);
            background: #6b7da3;
        }

        #section4 .face.bottom {
            width: 120px;
            height: 120px;
            transform: rotateX(-90deg) translateZ(175px);
            background: #6b7da3;
        }

        /* Quinta sección */
        #section5 {
            width: 80px;
            height: 300px;
            transform: translateY(-1700px);
        }

        #section5 .face.front,
        #section5 .face.back {
            width: 80px;
            height: 300px;
        }

        #section5 .face.front {
            transform: rotateY(0deg) translateZ(40px);
        }

        #section5 .face.back {
            transform: rotateY(180deg) translateZ(40px);
        }

        #section5 .face.left,
        #section5 .face.right {
            width: 80px;
            height: 300px;
        }

        #section5 .face.left {
            transform: rotateY(-90deg) translateZ(40px);
        }

        #section5 .face.right {
            transform: rotateY(90deg) translateZ(40px);
        }

        #section5 .face.top {
            width: 80px;
            height: 80px;
            transform: rotateX(90deg) translateZ(150px);
            background: #6b7da3;
        }

        #section5 .face.bottom {
            width: 80px;
            height: 80px;
            transform: rotateX(-90deg) translateZ(150px);
            background: #6b7da3;
        }

        /* Sección superior */
        #top-section {
            width: 60px;
            height: 200px;
            transform: translateY(-2000px);
        }

        #top-section .face.front,
        #top-section .face.back {
            width: 60px;
            height: 200px;
        }

        #top-section .face.front {
            transform: rotateY(0deg) translateZ(30px);
        }

        #top-section .face.back {
            transform: rotateY(180deg) translateZ(30px);
        }

        #top-section .face.left,
        #top-section .face.right {
            width: 60px;
            height: 200px;
        }

        #top-section .face.left {
            transform: rotateY(-90deg) translateZ(30px);
        }

        #top-section .face.right {
            transform: rotateY(90deg) translateZ(30px);
        }

        #top-section .face.top {
            width: 60px;
            height: 60px;
            transform: rotateX(90deg) translateZ(100px);
            background: #6b7da3;
        }

        #top-section .face.bottom {
            width: 60px;
            height: 60px;
            transform: rotateX(-90deg) translateZ(100px);
            background: #6b7da3;
        }

        /* Antena */
        #antenna {
            position: absolute;
            width: 6px;
            height: 250px;
            background: #666;
            left: 50%;
            transform: translateX(-50%) translateY(-2200px);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        /* Luz en la punta */
        #top-light {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #ff0000;
            border-radius: 50%;
            left: 50%;
            transform: translateX(-50%) translateY(-2220px);
            box-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: translateX(-50%) translateY(-2220px) scale(1); }
            50% { opacity: 0.8; transform: translateX(-50%) translateY(-2220px) scale(1.2); }
        }

        /* Suelo */
        #ground {
            position: absolute;
            width: 2000px;
            height: 2000px;
            background: #2a2a3e;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(90deg) translateZ(-100px);
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.5);
        }

        /* Info panel */
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 20px;
            border-radius: 10px;
            z-index: 100;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }

        #info h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        #info p {
            margin: 5px 0;
            line-height: 1.6;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 20px;
            border-radius: 10px;
            z-index: 100;
            backdrop-filter: blur(10px);
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="scene">
        <div id="ground"></div>
        <div id="building-container">
            <!-- Base principal -->
            <div id="base" class="building-block">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face left"></div>
                <div class="face right"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>

            <!-- Segunda sección -->
            <div id="section2" class="building-block">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face left"></div>
                <div class="face right"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>

            <!-- Tercera sección -->
            <div id="section3" class="building-block">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face left"></div>
                <div class="face right"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>

            <!-- Cuarta sección -->
            <div id="section4" class="building-block">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face left"></div>
                <div class="face right"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>

            <!-- Quinta sección -->
            <div id="section5" class="building-block">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face left"></div>
                <div class="face right"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>

            <!-- Sección superior -->
            <div id="top-section" class="building-block">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face left"></div>
                <div class="face right"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>

            <!-- Antena -->
            <div id="antenna"></div>
            <div id="top-light"></div>
        </div>
    </div>

    <div id="info">
        <h1>🏢 Empire State Building</h1>
        <p>🖱️ Click y arrastra para rotar</p>
        <p>🔍 Rueda del mouse para zoom</p>
        <p>📐 Altura: ~381m (1,250 pies)</p>
    </div>
    <div id="controls">
        <p>Usa el mouse para interactuar con la escena</p>
    </div>

    <script>
        // Función para crear ventanas en una cara
        function createWindows(face, width, height, windowSize = 20, spacing = 5) {
            const cols = Math.floor(width / (windowSize + spacing));
            const rows = Math.floor(height / (windowSize + spacing));
            
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const window = document.createElement('div');
                    window.className = 'window';
                    
                    // Algunas ventanas iluminadas aleatoriamente
                    if (Math.random() > 0.7) {
                        window.classList.add('lit');
                    }
                    
                    window.style.width = windowSize + 'px';
                    window.style.height = windowSize + 'px';
                    window.style.position = 'absolute';
                    window.style.left = (col * (windowSize + spacing) + spacing) + 'px';
                    window.style.top = (row * (windowSize + spacing) + spacing) + 'px';
                    
                    face.appendChild(window);
                }
            }
        }

        // Crear ventanas para todas las caras
        function initializeWindows() {
            // Base
            const baseFront = document.querySelector('#base .front');
            const baseBack = document.querySelector('#base .back');
            const baseLeft = document.querySelector('#base .left');
            const baseRight = document.querySelector('#base .right');
            createWindows(baseFront, 300, 400, 18, 4);
            createWindows(baseBack, 300, 400, 18, 4);
            createWindows(baseLeft, 300, 400, 18, 4);
            createWindows(baseRight, 300, 400, 18, 4);

            // Sección 2
            const s2Front = document.querySelector('#section2 .front');
            const s2Back = document.querySelector('#section2 .back');
            const s2Left = document.querySelector('#section2 .left');
            const s2Right = document.querySelector('#section2 .right');
            createWindows(s2Front, 240, 500, 16, 4);
            createWindows(s2Back, 240, 500, 16, 4);
            createWindows(s2Left, 240, 500, 16, 4);
            createWindows(s2Right, 240, 500, 16, 4);

            // Sección 3
            const s3Front = document.querySelector('#section3 .front');
            const s3Back = document.querySelector('#section3 .back');
            const s3Left = document.querySelector('#section3 .left');
            const s3Right = document.querySelector('#section3 .right');
            createWindows(s3Front, 180, 400, 14, 3);
            createWindows(s3Back, 180, 400, 14, 3);
            createWindows(s3Left, 180, 400, 14, 3);
            createWindows(s3Right, 180, 400, 14, 3);

            // Sección 4
            const s4Front = document.querySelector('#section4 .front');
            const s4Back = document.querySelector('#section4 .back');
            const s4Left = document.querySelector('#section4 .left');
            const s4Right = document.querySelector('#section4 .right');
            createWindows(s4Front, 120, 350, 12, 3);
            createWindows(s4Back, 120, 350, 12, 3);
            createWindows(s4Left, 120, 350, 12, 3);
            createWindows(s4Right, 120, 350, 12, 3);

            // Sección 5
            const s5Front = document.querySelector('#section5 .front');
            const s5Back = document.querySelector('#section5 .back');
            const s5Left = document.querySelector('#section5 .left');
            const s5Right = document.querySelector('#section5 .right');
            createWindows(s5Front, 80, 300, 10, 2);
            createWindows(s5Back, 80, 300, 10, 2);
            createWindows(s5Left, 80, 300, 10, 2);
            createWindows(s5Right, 80, 300, 10, 2);

            // Top section
            const topFront = document.querySelector('#top-section .front');
            const topBack = document.querySelector('#top-section .back');
            const topLeft = document.querySelector('#top-section .left');
            const topRight = document.querySelector('#top-section .right');
            createWindows(topFront, 60, 200, 8, 2);
            createWindows(topBack, 60, 200, 8, 2);
            createWindows(topLeft, 60, 200, 8, 2);
            createWindows(topRight, 60, 200, 8, 2);
        }

        // Controles de rotación
        const buildingContainer = document.getElementById('building-container');
        const scene = document.getElementById('scene');
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let rotation = { x: -20, y: 45 };
        let zoom = 1;

        // Inicializar rotación
        updateTransform();

        // Mouse down
        scene.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        // Mouse move
        scene.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;
                
                rotation.y += deltaX * 0.5;
                rotation.x -= deltaY * 0.5;
                
                // Limitar rotación vertical
                rotation.x = Math.max(-90, Math.min(90, rotation.x));
                
                updateTransform();
                previousMousePosition = { x: e.clientX, y: e.clientY };
            }
        });

        // Mouse up
        scene.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Mouse leave
        scene.addEventListener('mouseleave', () => {
            isDragging = false;
        });

        // Zoom con rueda
        scene.addEventListener('wheel', (e) => {
            e.preventDefault();
            zoom += e.deltaY * -0.001;
            zoom = Math.max(0.5, Math.min(2, zoom));
            updateTransform();
        });

        // Touch events para móviles
        let touchStart = null;
        scene.addEventListener('touchstart', (e) => {
            touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        });

        scene.addEventListener('touchmove', (e) => {
            if (touchStart) {
                const deltaX = e.touches[0].clientX - touchStart.x;
                const deltaY = e.touches[0].clientY - touchStart.y;
                
                rotation.y += deltaX * 0.5;
                rotation.x -= deltaY * 0.5;
                
                rotation.x = Math.max(-90, Math.min(90, rotation.x));
                
                updateTransform();
                touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
        });

        scene.addEventListener('touchend', () => {
            touchStart = null;
        });

        function updateTransform() {
            buildingContainer.style.transform = `translate(-50%, -50%) rotateX(${rotation.x}deg) rotateY(${rotation.y}deg) scale(${zoom})`;
        }

        // Inicializar ventanas
        initializeWindows();
    </script>
</body>
</html>
